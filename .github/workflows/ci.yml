name: ASCILINE CI

# NOTE: This pipeline is currently codec-focused.
# It verifies Python↔JS bit-exact correctness across all codec tags (RAW, ZLIB, DELTA,
# RLE_FULL, DCT) and runs the existing pytest suite.
# What is NOT yet covered: WebSocket frame streaming, live playback sequencing,
# backpressure/jitter timing, and end-to-end server integration.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from the GitHub Actions tab

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install System Dependencies
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest numpy opencv-python aiohttp Pillow

    - name: Run Flake8 (Fatal Errors Only)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Pytest Suite
      run: pytest test/

    - name: Generate Synthetic Test Videos
      run: bash experiments/make_test_clips.sh

    - name: Bit-Exact Test (Tags 1-3)
      run: |
        python experiments/gen_vectors.py
        node experiments/check_vectors.js

    - name: Bit-Exact Test (Tag 4 DCT)
      run: |
        python experiments/profile_vectors.py
        node experiments/check_profile.js
